name: Release

# release-please owns versioning: on every push to main it opens/updates a Release PR
# (version bump + changelog). Merging that Release PR tags the release, and the gated `publish`
# job runs in the SAME workflow run — the bot's tag, made with GITHUB_TOKEN, can't trigger a
# separate workflow, so publishing must live here behind `release_created`.
on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release commit, tag, and GitHub Release
      pull-requests: write # open/update the Release PR
      issues: write # label the Release PR (autorelease: pending/tagged)
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test:unit

      # Ensure npm is recent enough for OIDC trusted publishing
      - run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN — OIDC trusted publishing handles auth.
      # Configure the trusted publisher once on npmjs.com (repo + this workflow filename).
      - run: npm publish --provenance
